# ============================================================
# Monitor
# ============================================================
monitor = ,preferred,auto,1

# ============================================================
# Autostart
# ============================================================
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = hypridle
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet
# Clipboard manager: keeps history of last 100 entries
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ============================================================
# Environment variables
# ============================================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,breeze
env = GDK_BACKEND,wayland,x11,*
env = MOZ_ENABLE_WAYLAND,1
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# ============================================================
# XWayland (for legacy apps without native Wayland support)
# ============================================================
xwayland {
    enabled = true
    use_nearest_neighbor = false
    force_zero_scaling = false
}

# ============================================================
# Cursor
# ============================================================
cursor {
    # Hide cursor after 5s of inactivity
    inactive_timeout = 5
    # Do not hide cursor while typing
    hide_on_key_press = false
    # No cursor warp on focus change
    no_warps = true
}

# ============================================================
# Input
# ============================================================
input {
    kb_layout = us
    follow_mouse = 1
    # Flat mouse acceleration — recommended for desktop/gaming
    sensitivity = 0
    accel_profile = flat
    # Key repeat rate (comfortable for terminal use)
    repeat_rate  = 25
    repeat_delay = 400
    # Focus follows mouse without auto-raising
    float_switch_override_focus = 2
}

# ============================================================
# General
# ============================================================
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2
    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
    # Resize windows by dragging any border edge
    resize_on_border = true
    extend_border_grab_area = 10
}

# ============================================================
# Decoration
# ============================================================
decoration {
    rounding = 8

    # Slightly dim inactive windows
    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size    = 3
        passes  = 1
        new_optimizations = true
        xray    = false
    }

    shadow {
        enabled = false
    }
}

# ============================================================
# Animations
# ============================================================
animations {
    enabled = true

    bezier = easeOut,   0.05, 0.9,  0.1, 1.05
    bezier = easeIn,    0.4,  0.0,  1.0, 1.0
    bezier = easeInOut, 0.4,  0.0,  0.2, 1.0
    bezier = linear,    0.0,  0.0,  1.0, 1.0

    animation = windows,     1, 5,  easeOut
    animation = windowsOut,  1, 4,  easeIn,   popin 80%
    animation = windowsMove, 1, 4,  easeInOut
    animation = border,      1, 10, default
    animation = borderangle, 1, 8,  linear, loop
    animation = fade,        1, 5,  default
    animation = workspaces,  1, 5,  easeOut
    animation = layers,      1, 4,  easeOut
}

# ============================================================
# Layout: Dwindle (Binary Space Partitioning)
# ============================================================
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split        = false
    smart_resizing     = true
    use_active_for_splits = true
}

# ============================================================
# Misc
# ============================================================
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true

    # Variable framerate: reduces GPU/CPU usage when nothing is animating
    vfr = true

    # Wake screen on mouse move or key press (after hypridle turns it off)
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true

    # Apps requesting focus actually receive it instead of just flashing
    focus_on_activate = true

    allow_session_lock_restore = true
}

# ============================================================
# Render
# ============================================================
render {
    # Explicit sync: more stable on AMD GPUs with modern drivers
    explicit_sync = 2
}

# ============================================================
# Keybindings
# ============================================================
$mainMod = SUPER

# Apps
bind = $mainMod,       Return, exec, foot
bind = $mainMod,       D,      exec, wofi --show drun
bind = $mainMod,       E,      exec, dolphin
# Clipboard history via wofi
bind = $mainMod,       C,      exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Window management
bind = $mainMod,       Q, killactive
bind = $mainMod,       F, fullscreen
bind = $mainMod SHIFT, F, fakefullscreen
bind = $mainMod,       V, togglefloating
bind = $mainMod,       P, pseudo
bind = $mainMod,       J, togglesplit

# Lock / exit
bind = $mainMod,            L,   exec, hyprlock
bind = $mainMod CTRL SHIFT, Q,   exit

# Screenshot: select region → swappy
bind = ,        Print, exec, grim -g "$(slurp)" - | swappy -f -
# Screenshot: full screen → swappy
bind = SHIFT,   Print, exec, grim - | swappy -f -
# Screenshot: active window
bind = $mainMod, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | swappy -f -

# Audio
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute,        exec, pamixer -t
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindl  = , XF86AudioNext,        exec, playerctl next

# Focus (arrow keys + vim-style)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows (vim-style)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace (and follow)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace silently (stay on current workspace)
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5

# Scroll through workspaces with mouse wheel
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move / resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ---- Resize submap (Super+R → resize mode, Escape to exit) ----
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive,  20  0
binde = , left,  resizeactive, -20  0
binde = , up,    resizeactive,   0 -20
binde = , down,  resizeactive,   0  20
binde = , L,     resizeactive,  20  0
binde = , H,     resizeactive, -20  0
binde = , K,     resizeactive,   0 -20
binde = , J,     resizeactive,   0  20
bind  = , Escape, submap, reset
bind  = , Return, submap, reset
submap = reset

# ============================================================
# Window rules
# ============================================================

# Prevent apps from self-maximizing and bypassing gaps/borders
windowrulev2 = suppressevent maximize, class:.*

# Floating dialogs
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(swappy)$
windowrulev2 = float, class:^(hyprpicker)$
windowrulev2 = float, class:^(eog)$
windowrulev2 = float, class:^(gwenview)$

# Steam: main window on workspace 9, popups floating
windowrulev2 = workspace 9 silent, class:^(steam)$, title:^(Steam)$
windowrulev2 = float,              class:^(steam)$, title:^(?!Steam$)

# Game windows: disable blur/rounding for full performance
windowrulev2 = noblur,     class:^(steam_app_.*)$
windowrulev2 = rounding 0, class:^(steam_app_.*)$
windowrulev2 = fullscreen, class:^(steam_app_.*)$

# ============================================================
# Layer rules (animations for waybar, wofi, mako)
# ============================================================
layerrule = animation popin 80%, wofi
layerrule = blur,        waybar
layerrule = blur,        notifications
layerrule = ignorezero,  notifications
