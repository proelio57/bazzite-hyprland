general {
    hide_cursor = true
}

background {
    path        = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.6
}

# Clock
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(255, 255, 255, 0.9)
    font_size   = 80
    font_family = Sans Bold
    position    = 0, 180
    halign      = center
    valign      = center
}

# Date
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d %Y")"
    color       = rgba(255, 255, 255, 0.7)
    font_size   = 20
    font_family = Sans
    position    = 0, 90
    halign      = center
    valign      = center
}

# Password input field
input-field {
    monitor  =
    size     = 300, 48
    position = 0, -100
    halign   = center
    valign   = center

    outline_thickness = 2
    dots_size         = 0.3
    dots_spacing      = 0.15
    dots_center       = true

    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color  = rgba(255, 255, 255, 0.9)
    check_color = rgba(51, 204, 255, 1.0)
    fail_color  = rgba(255, 100, 100, 1.0)

    placeholder_text = <i>Enter password...</i>
    fail_text        = <b>Wrong password ($ATTEMPTS)</b>

    rounding      = 8
    fade_on_empty = false
    hide_input    = false
}
